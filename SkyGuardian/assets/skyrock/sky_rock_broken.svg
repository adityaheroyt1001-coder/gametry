<!-- Copy from here for the SVG -->
<svg class="game-asset" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="rockGradA" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#a89c90"/>
      <stop offset="50%" stop-color="#6e6259"/>
      <stop offset="100%" stop-color="#2e2723"/>
    </linearGradient>
    <linearGradient id="rockGradB" x1="70%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#93887d"/>
      <stop offset="55%" stop-color="#5c5148"/>
      <stop offset="100%" stop-color="#241f1c"/>
    </linearGradient>
    <linearGradient id="rockGradC" x1="90%" y1="10%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#b3a89d"/>
      <stop offset="55%" stop-color="#786c60"/>
      <stop offset="100%" stop-color="#332b27"/>
    </linearGradient>
    <linearGradient id="mossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fae56"/>
      <stop offset="100%" stop-color="#4d6a2e"/>
    </linearGradient>
    <linearGradient id="veinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#d99a1f"/>
    </linearGradient>

    <!-- flash / burst of light at the point of impact -->
    <radialGradient id="burstGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ffe27a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe27a" stop-opacity="0"/>
    </radialGradient>

    <filter name="shard-shadow" id="shardShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="3" dy="9" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ===================== impact flash behind the debris ===================== -->
  <circle cx="420" cy="255" r="150" fill="url(#burstGrad)"/>

  <!-- ===================== speed/impact lines radiating outward ===================== -->
  <g stroke="#fff6d8" stroke-opacity="0.5" stroke-linecap="round" fill="none">
    <path d="M 420,255 L 480,150" stroke-width="3"/>
    <path d="M 420,255 L 560,200" stroke-width="2.5"/>
    <path d="M 420,255 L 600,300" stroke-width="3"/>
    <path d="M 420,255 L 520,390" stroke-width="2.5"/>
    <path d="M 420,255 L 340,420" stroke-width="3"/>
    <path d="M 420,255 L 240,360" stroke-width="2.5"/>
    <path d="M 420,255 L 220,220" stroke-width="3"/>
    <path d="M 420,255 L 330,120" stroke-width="2.5"/>
  </g>

  <!-- ===================== SHATTERED ROCK SHARDS (flying apart) ===================== -->

  <!-- top-left shard -->
  <g transform="translate(-38,-46) rotate(-14 300 190)" filter="url(#shardShadow)">
    <path d="M 305,155 L 365,125 L 400,150 L 385,205 L 330,210 L 290,185 Z" fill="url(#rockGradC)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 305,155 L 365,125 L 380,150 L 340,175 Z" fill="#c2b7ac" opacity="0.6"/>
    <path d="M 330,178 C 345,188 358,196 370,205" stroke="#0e0b09" stroke-opacity="0.5" stroke-width="2" fill="none"/>
    <ellipse cx="345" cy="150" rx="12" ry="5" fill="#ffffff" opacity="0.3" transform="rotate(-20 345 150)"/>
  </g>

  <!-- top-right shard -->
  <g transform="translate(46,-52) rotate(18 490 175)" filter="url(#shardShadow)">
    <path d="M 430,120 L 520,145 L 545,180 L 500,205 L 445,190 L 425,150 Z" fill="url(#rockGradA)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 430,120 L 520,145 L 505,165 L 455,160 Z" fill="#c9beb2" opacity="0.6"/>
    <ellipse cx="470" cy="150" rx="16" ry="6" fill="#ffffff" opacity="0.32" transform="rotate(-16 470 150)"/>
  </g>

  <!-- right shard -->
  <g transform="translate(70,10) rotate(24 570 235)" filter="url(#shardShadow)">
    <path d="M 545,190 L 590,220 L 585,275 L 545,270 L 530,225 Z" fill="url(#rockGradB)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 545,190 L 585,215 L 560,235 Z" fill="#a89c90" opacity="0.55"/>
  </g>

  <!-- bottom-right shard -->
  <g transform="translate(48,58) rotate(-20 545 335)" filter="url(#shardShadow)">
    <path d="M 500,300 L 570,300 L 555,355 L 505,375 L 470,340 Z" fill="url(#rockGradC)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 500,300 L 555,310 L 520,335 Z" fill="#c2b7ac" opacity="0.5"/>
    <path d="M 520,335 C 530,345 540,352 550,358" stroke="#0e0b09" stroke-opacity="0.45" stroke-width="1.8" fill="none"/>
  </g>

  <!-- bottom-center shard (largest) -->
  <g transform="translate(-6,64) rotate(10 400 355)" filter="url(#shardShadow)">
    <path d="M 340,320 L 415,340 L 425,375 L 375,400 L 320,380 L 305,345 Z" fill="url(#rockGradA)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 340,320 L 415,340 L 390,360 L 350,350 Z" fill="#9a8f86" opacity="0.55"/>
    <path d="M 328,338 C 316,350 314,364 322,376" fill="none" stroke="#0e0b09" stroke-opacity="0.4" stroke-width="1.6"/>
    <path d="M 340,325 C 320,340 310,358 315,375" fill="none" stroke="url(#veinGrad)" stroke-opacity="0.5" stroke-width="1.2"/>
    <path d="M 330,362 C 340,368 350,372 358,374" fill="url(#mossGrad)" opacity="0.7" stroke="none"/>
  </g>

  <!-- bottom-left shard -->
  <g transform="translate(-64,44) rotate(-26 280 330)" filter="url(#shardShadow)">
    <path d="M 260,270 L 305,290 L 300,340 L 260,355 L 235,315 Z" fill="url(#rockGradB)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 260,270 L 300,290 L 275,305 Z" fill="#a89c90" opacity="0.5"/>
    <path d="M 250,300 C 258,310 268,318 278,323" fill="url(#mossGrad)" opacity="0.65" stroke="none"/>
  </g>

  <!-- left shard -->
  <g transform="translate(-70,-6) rotate(-32 260 235)" filter="url(#shardShadow)">
    <path d="M 250,205 L 290,200 L 295,255 L 260,270 L 235,235 Z" fill="url(#rockGradC)" stroke="#1a1512" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="265" cy="220" rx="9" ry="4" fill="#ffffff" opacity="0.28" transform="rotate(-10 265 220)"/>
  </g>

  <!-- small scattered chips / dust -->
  <g filter="url(#shardShadow)">
    <path d="M 400,150 L 414,144 L 420,158 L 408,164 Z" fill="url(#rockGradA)"/>
    <path d="M 560,255 L 572,250 L 576,262 L 564,267 Z" fill="url(#rockGradB)"/>
    <path d="M 330,410 L 342,405 L 347,417 L 335,422 Z" fill="url(#rockGradC)"/>
    <path d="M 235,270 L 246,266 L 250,277 L 239,281 Z" fill="url(#rockGradA)"/>
  </g>
  <g opacity="0.55">
    <circle cx="450" cy="130" r="3" fill="#c9beb2"/>
    <circle cx="610" cy="230" r="2.5" fill="#c9beb2"/>
    <circle cx="380" cy="430" r="3" fill="#c9beb2"/>
    <circle cx="205" cy="245" r="2.5" fill="#c9beb2"/>
    <circle cx="530" cy="400" r="2" fill="#c9beb2"/>
    <circle cx="290" cy="130" r="2.5" fill="#c9beb2"/>
  </g>
</svg>
